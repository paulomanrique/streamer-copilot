appId: com.paulomanrique.streamer-copilot
productName: Streamer Copilot
directories:
  output: release
files:
  - dist/**/*
  - package.json
asar: true
compression: maximum
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: paulomanrique
  repo: streamer-copilot
mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  maintainer: Paulo Manrique <paulo@manriq.dev>
  target:
    - AppImage
    - deb
