<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b0764"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="arcGlow" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e9d5ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer arc — broadcast wave 1 (faintest) -->
  <path d="M10,46 A22,22 0 0 1 54,46"
        stroke="white" stroke-width="3.2" fill="none"
        stroke-linecap="round" opacity="0.35"/>

  <!-- Middle arc — broadcast wave 2 -->
  <path d="M17,46 A15,15 0 0 1 47,46"
        stroke="white" stroke-width="3.2" fill="none"
        stroke-linecap="round" opacity="0.65"/>

  <!-- Inner arc — broadcast wave 3 (strongest) -->
  <path d="M24,46 A8,8 0 0 1 40,46"
        stroke="url(#arcGlow)" stroke-width="3.2" fill="none"
        stroke-linecap="round"/>

  <!-- Antenna pole -->
  <line x1="32" y1="46" x2="32" y2="25"
        stroke="white" stroke-width="3.2" stroke-linecap="round"/>

  <!-- 4-point star at pole tip (copilot mark) -->
  <!-- outer r=6, inner r=2.2 — tip bottom at y=25 merges with pole top -->
  <path d="M32,13
           L33.56,16.97
           L38,18.5
           L33.56,20.03
           L32,24
           L30.44,20.03
           L26,18.5
           L30.44,16.97 Z"
        fill="white"/>

  <!-- Small accent sparkle top-right -->
  <path d="M48,11
           L48.85,13.15
           L51,14
           L48.85,14.85
           L48,17
           L47.15,14.85
           L45,14
           L47.15,13.15 Z"
        fill="white" opacity="0.6"/>
</svg>
