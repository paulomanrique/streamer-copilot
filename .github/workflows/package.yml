name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-14
            script: package:mac
          - name: Windows NSIS
            os: windows-2022
            script: package:win
          - name: Linux AppImage + deb
            os: ubuntu-22.04
            script: package:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streamer-copilot-${{ matrix.name }}
          path: release/**
          if-no-files-found: error
